version: '3.9'

services:
  # ── MySQL ─────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Web (Next.js) ─────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:          production
      MYSQL_HOST:        mysql
      MYSQL_PORT:        "3306"
      MYSQL_USER:        ${MYSQL_USER}
      MYSQL_PASSWORD:    ${MYSQL_PASSWORD}
      MYSQL_DATABASE:    ${MYSQL_DATABASE}
      JWT_SECRET:        ${JWT_SECRET}
      REDIS_URL:         redis://redis:6379
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      VIDEO_DIR:         /data/videos
      WORKER_INTERNAL_URL: http://worker:3001
      PADDLE_ENVIRONMENT: ${PADDLE_ENVIRONMENT:-production}
      PADDLE_API_KEY:    ${PADDLE_API_KEY:-}
      PADDLE_WEBHOOK_SECRET: ${PADDLE_WEBHOOK_SECRET:-}
      PADDLE_STARTER_PRICE_ID: ${PADDLE_STARTER_PRICE_ID:-}
      PADDLE_PRO_PRICE_ID: ${PADDLE_PRO_PRICE_ID:-}
    volumes:
      - video_data:/data/videos
    expose:
      - "3000"

  # ── Worker (BullMQ) ───────────────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:          production
      MYSQL_HOST:        mysql
      MYSQL_PORT:        "3306"
      MYSQL_USER:        ${MYSQL_USER}
      MYSQL_PASSWORD:    ${MYSQL_PASSWORD}
      MYSQL_DATABASE:    ${MYSQL_DATABASE}
      REDIS_URL:         redis://redis:6379
      OPENAI_API_KEY:     ${OPENAI_API_KEY}
      OPENAI_BASE_URL:    ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL:       ${OPENAI_MODEL:-gpt-4o-mini}
      TTS_PROVIDER:       ${TTS_PROVIDER:-auto}
      OPENAI_TTS_API_KEY: ${OPENAI_TTS_API_KEY:-}
      OPENAI_TTS_BASE_URL: ${OPENAI_TTS_BASE_URL:-https://api.openai.com/v1}
      OPENAI_TTS_MODEL:   ${OPENAI_TTS_MODEL:-gpt-4o-mini-tts}
      OPENAI_TTS_VOICE:   ${OPENAI_TTS_VOICE:-coral}
      OPENAI_TTS_SPEED:   ${OPENAI_TTS_SPEED:-0.95}
      OPENAI_TTS_INSTRUCTIONS: ${OPENAI_TTS_INSTRUCTIONS:-}
      VIDEO_DIR:         /data/videos
    expose:
      - "3001"   # 内网 HTTP API，供 web 服务代理，不对外暴露
    volumes:
      - video_data:/data/videos

  # ── Nginx ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - video_data:/data/videos:ro

volumes:
  mysql_data:
  redis_data:
  video_data:
